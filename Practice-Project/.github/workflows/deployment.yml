name: Deploy Project
on: [push, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Get code
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Get code
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Run lint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Get code
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Run build
        run: npm run build

  deploy:
    needs: [test,lint,build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Get code
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: Deploy
        run: echo "Deployment in progress..."

